<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Ruhul Amin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-lg flex items-center justify-center text-white font-bold text-xs">RA</div>
        <span class="font-bold text-gray-900">Ruhul Amin</span>
      </a>
      <a href="../index.html" class="text-gray-600 hover:text-blue-600 text-sm font-medium">← Back to Home</a>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-16">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-gray-900 mb-3">Contact Me</h1>
      <p class="text-gray-500 text-lg">যেকোনো প্রশ্ন বা প্রজেক্টের জন্য আমার সাথে যোগাযোগ করুন</p>
    </div>
    <div class="grid lg:grid-cols-3 gap-8">
      <div class="space-y-6">
        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm space-y-4">
          <h2 class="font-bold text-gray-900 text-lg mb-4">Get In Touch</h2>
          <div class="flex items-center gap-3 text-gray-600" id="cEmail"><span class="text-2xl">📧</span><span>Loading...</span></div>
          <div class="flex items-center gap-3 text-gray-600" id="cPhone"><span class="text-2xl">📱</span><span>—</span></div>
          <div class="flex items-center gap-3 text-gray-600" id="cLocation"><span class="text-2xl">📍</span><span>—</span></div>
        </div>
        <div class="bg-blue-600 rounded-2xl p-6 text-white">
          <h3 class="font-semibold mb-2">Available For</h3>
          <p class="text-blue-200 text-sm">Freelance projects, internships, and full-time opportunities.</p>
        </div>
      </div>
      <div class="lg:col-span-2">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
          <form id="contactForm" class="space-y-5">
            <div class="grid sm:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Your Name *</label>
                <input id="cName" required class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Md. Example">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email *</label>
                <input id="cEmailInput" type="email" required class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="you@example.com">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Subject</label>
              <input id="cSubject" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Project Inquiry">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Message *</label>
              <textarea id="cMessage" rows="6" required class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none" placeholder="Write your message here..."></textarea>
            </div>
            <div id="cSuccess" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-xl px-4 py-3 text-sm">✅ Message sent successfully!</div>
            <div id="cError" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm"></div>
            <button type="submit" id="sendBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-colors">
              Send Message →
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

<script>
const API_BASE = 'https://ruhul-amin-portfolio.onrender.com/api';

async function apiGet(path) {
  const res = await fetch(API_BASE + path);
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

async function loadProfile() {
  try {
    const { data } = await apiGet('/profile');
    const p = data.profile;
    if (p.email)    document.getElementById('cEmail').querySelector('span:last-child').textContent = p.email;
    if (p.phone)    document.getElementById('cPhone').querySelector('span:last-child').textContent = p.phone;
    if (p.location) document.getElementById('cLocation').querySelector('span:last-child').textContent = p.location;
  } catch(e) {}
}
loadProfile();

document.getElementById('contactForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('sendBtn');
  document.getElementById('cSuccess').classList.add('hidden');
  document.getElementById('cError').classList.add('hidden');
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try {
    await apiPost('/contact', {
      name:    document.getElementById('cName').value,
      email:   document.getElementById('cEmailInput').value,
      subject: document.getElementById('cSubject').value,
      message: document.getElementById('cMessage').value
    });
    document.getElementById('cSuccess').classList.remove('hidden');
    document.getElementById('contactForm').reset();
  } catch(err) {
    document.getElementById('cError').textContent = err.message;
    document.getElementById('cError').classList.remove('hidden');
  }
  btn.textContent = 'Send Message →';
  btn.disabled = false;
});
</script>
</body>
</html>
