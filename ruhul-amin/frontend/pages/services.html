<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services — Ruhul Amin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-lg flex items-center justify-center text-white font-bold text-xs">RA</div>
        <span class="font-bold text-gray-900">Ruhul Amin</span>
      </a>
      <a href="../index.html" class="text-gray-600 hover:text-blue-600 text-sm font-medium">← Back to Home</a>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-16">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-gray-900 mb-3">My Services</h1>
      <p class="text-gray-500 text-lg">আমি যে সেবাগুলো প্রদান করি</p>
    </div>
    <div id="servicesGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-3 text-center text-gray-400 py-12">Loading...</div>
    </div>
  </div>
<script>
const API_BASE = 'https://ruhul-amin-portfolio.onrender.com/api';
fetch(API_BASE + '/profile')
  .then(r => r.json())
  .then(({data}) => {
    const svcs = data.services || [];
    document.getElementById('servicesGrid').innerHTML = svcs.length ? svcs.map(s => `
      <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
        <div class="text-4xl mb-4">${s.icon || '🔧'}</div>
        <h3 class="font-bold text-gray-900 text-xl mb-2">${s.title}</h3>
        <p class="text-gray-500">${s.description || ''}</p>
      </div>
    `).join('') : '<div class="col-span-3 text-center text-gray-400 py-12">No services added yet.</div>';
  }).catch(() => {});
</script>
</body>
</html>
