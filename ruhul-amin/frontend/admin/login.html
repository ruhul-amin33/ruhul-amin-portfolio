<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Ruhul Amin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4">RA</div>
    <h1 class="text-2xl font-bold text-white">Admin Panel</h1>
    <p class="text-slate-400 text-sm mt-1">Sign in to manage your portfolio</p>
  </div>

  <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-3xl p-8">
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
        <input type="email" id="email" required
          class="w-full bg-white/10 border border-white/20 text-white placeholder-slate-400 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="ruhul@example.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
        <div class="relative">
          <input type="password" id="password" required
            class="w-full bg-white/10 border border-white/20 text-white placeholder-slate-400 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="••••••••">
          <button type="button" onclick="togglePass()" class="absolute right-3 top-3.5 text-slate-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <div id="errorMsg" class="hidden bg-red-500/20 border border-red-400/40 text-red-300 text-sm rounded-xl px-4 py-3"></div>
      <button type="submit" id="loginBtn"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all">
        Sign In
      </button>
    </form>
    <p class="text-center text-slate-500 text-xs mt-6">
      <a href="../index.html" class="hover:text-slate-300 transition-colors">← Back to Website</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
// If already logged in, go to dashboard
if (token.get()) {
  apiGet('/auth/me', true).then(() => location.href = 'dashboard.html').catch(() => token.remove());
}

function togglePass() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  err.classList.add('hidden');
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const data = await apiPost('/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    token.set(data.token);
    location.href = 'dashboard.html';
  } catch(e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
